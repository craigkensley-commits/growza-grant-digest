name: GrowZA Client Grant Digest

on:
  schedule:
    - cron: '0 5 * * 1'  # Monday 7AM SAST (5AM UTC)
    - cron: '0 5 * * 4'  # Thursday 7AM SAST (5AM UTC)
  workflow_dispatch:      # Manual trigger anytime

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run grant digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python grant_digest.py
